[gcode_macro _CONFIG_BASE]
variable_bed_clear     : True
variable_surface       : 'PEI_TEXTURED'
variable_filament      : ['ABS','POLYMAKER','BLACK']
variable_nozzle        : 0.4
gcode:

[gcode_macro CONFIG_GET]
gcode:
    {% set SECT = params.SECT|string|upper %}
    {% set NAME = params.NAME|string|lower %}

    {% set SAVED = params.SAVED|default(0) %}

    {% if SAVED %}
        {% set svv = printer.save_variables.variables %}
        _LOG NAME=config.GET MSG="Saved {SECT}.{NAME}: '{svv[NAME]}'"
    {% else %}
        {% set SECTION = "_CONFIG_" + SECT %}
        {% set config = printer["gcode_macro " + SECTION] %}

        _LOG NAME=config.GET MSG="{SECTION}.{NAME}: '{config[NAME]}'"
    {% endif %}

[gcode_macro CONFIG_SET]
gcode:
    {% set SECT = params.SECT|string|upper %}
    {% set NAME = params.NAME|string|lower %}
    {% set TO = params.TO %}

    {% set SAVE = params.SAVE|default(False) %}
    {% set PRINT = params.PRINT|default(False) %}

    {% set SECTION = "_CONFIG_" + SECT %}

    _LOG LVL=TRACE NAME=config.SET MSG="Attempting to set '{SECTION}.{NAME}' to '{TO}'. Save: '{SAVE}', Print: '{PRINT}'"

    _LOG LVL=DEBUG NAME=config.SET MSG="Setting {SECTION}.{NAME} to '{TO}'"
    SET_GCODE_VARIABLE MACRO={SECTION} VARIABLE={NAME} VALUE={TO}
    {% if PRINT %}
        CONFIG_GET SECT={SECT} NAME={NAME}
    {% endif %}
    {% if SAVE %}
        _LOG LVL=DEBUG NAME=config.SET MSG="Saving {NAME}={TO}"
        SAVE_VARIABLE VARIABLE={NAME} VALUE={TO}
    {% endif %}

[gcode_macro CONFIG_SHOW]
gcode:
    {% set SECT = params.SECT|default("")|string|upper %}

    {% if SECT == "" %}
        {% set filter_name = "gcode_macro _CONFIG" %}
        {% for key1 in printer %}
            {% if filter_name in key1 %}
                {% for key2 in printer[key1] %}
                    _LOG NAME=config.SHOW MSG="{key1}.{key2}: '{printer[key1][key2]}'"
                {% endfor %}
            {% endif %}
        {% endfor %}
    {% else %}
        {% set SECTION = "_CONFIG_" + SECT %}
        {% set config = printer["gcode_macro " + SECTION] %}

        {% for name in config.keys() %}
            _LOG NAME=config.SHOW MSG="{SECTION}.{name}: '{config[name]}'"
        {% endfor %}
    {%endif %}
